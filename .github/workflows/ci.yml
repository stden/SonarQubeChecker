name: Python CI (Optimized)

on:
  push:
    branches: [main, master, develop, dev]
  pull_request:
    branches: [main, master, develop, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
    
    - name: Install linting tools
      run: pip install -q ruff black mypy 2>/dev/null || true
    
    - name: Run ruff
      run: ruff check . --exit-zero || true
    
    - name: Check formatting
      run: black --check . --exit-zero || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel -q
        [ -f requirements.txt ] && pip install -r requirements.txt -q || true
        [ -f pyproject.toml ] && pip install -e . -q || true
    
    - name: Run tests
      run: pytest -v --tb=short 2>/dev/null || echo "No tests found"

